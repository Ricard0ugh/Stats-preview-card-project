<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

    <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
    
    <title>Frontend Mentor | Stats preview card component</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Lexend+Deca:wght@100..900&display=swap" rel="stylesheet">
    
    <!-- CSS file -->
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main>
      <section id="card-box">
        <div class="info-card">
          <h2>Get <span>insights</span> that help your business grow.</h2>

          <p>Discover the benefits of data analytics and make better decisions regarding revenue, customer 
          experience, and overall efficiency.</p>
          
          <div id="stats-box">
            <ul>
              <li>
                <div class="stat-value">10k+</div>
                <div class="stats">COMPANIES</div>
              </li>
              <li>
                <div class="stat-value">314</div> 
                <div class="stats">TEMPLATES</div>
              </li>
              <li>
                <div class="stat-value">12m+</div>
                <div class="stats">QUERIES</div>
              </li>
            </ul>
          </div>
        </div>
        <div class="image-box">
          <img
            src="images/image-header-desktop.jpg"
            alt="Picture of office ladies"
          >
        </div>
      </section>
    </main>
  </body>
</html>
